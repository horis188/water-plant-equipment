<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Blue background -->
  <circle cx="60" cy="60" r="58" fill="#1E6BB8"/>
  
  <!-- Three white wave curves -->
  <!-- Top wave - break on right -->
  <path d="M20 45 Q35 35, 50 40 Q65 45, 75 38 Q90 30, 100 35" 
        stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Middle wave - continuous -->
  <path d="M15 60 Q30 50, 45 55 Q60 60, 75 52 Q90 45, 105 55" 
        stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Bottom wave - break on left -->
  <path d="M20 75 Q30 68, 45 72 Q60 76, 75 70 Q95 62, 105 68" 
        stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
